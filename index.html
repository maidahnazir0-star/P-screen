<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Profile Clone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="top-bar">
        <button class="icon-btn" data-action="switch-account" aria-label="Switch account">▾</button>
        <h1 class="username">your_name</h1>
        <div class="top-actions">
          <button class="icon-btn" data-action="notifications" aria-label="Notifications">♡</button>
          <button class="icon-btn" data-action="menu" aria-label="Menu">☰</button>
        </div>
      </header>

      <section class="profile-overview">
        <div class="avatar">Y</div>
        <div class="stats">
          <button class="stat-btn" data-action="posts"><span>12</span> posts</button>
          <button class="stat-btn" data-action="followers"><span id="followers-count">1,245</span> followers</button>
          <button class="stat-btn" data-action="following"><span>430</span> following</button>
        </div>
      </section>

      <section class="bio">
        <h2>Your Name</h2>
        <p>Frontend creator ✨</p>
        <a href="#" data-action="link">www.yourbrand.com</a>
      </section>

      <section class="action-row">
        <button class="primary-btn" id="follow-btn">Follow</button>
        <button class="secondary-btn" data-action="message">Message</button>
        <button class="secondary-btn" data-action="share">Share profile</button>
        <button class="icon-btn bordered" data-action="person-add" aria-label="Discover people">👤+</button>
      </section>

      <section class="highlights">
        <button class="highlight" data-action="new-highlight">
          <span class="highlight-circle">+</span>
          <small>New</small>
        </button>
        <button class="highlight" data-action="highlight-travel">
          <span class="highlight-circle">🏝️</span>
          <small>Travel</small>
        </button>
        <button class="highlight" data-action="highlight-fits">
          <span class="highlight-circle">👟</span>
          <small>Fits</small>
        </button>
        <button class="highlight" data-action="highlight-food">
          <span class="highlight-circle">🍜</span>
          <small>Food</small>
        </button>
      </section>

      <section class="tabs" role="tablist">
        <button class="tab active" role="tab" data-tab="grid">▦</button>
        <button class="tab" role="tab" data-tab="reels">▶</button>
        <button class="tab" role="tab" data-tab="tagged">👤</button>
      </section>

      <section class="content">
        <div class="panel active" id="grid-panel">
          <div class="grid" id="post-grid"></div>
        </div>
        <div class="panel" id="reels-panel">
          <p>Reels are empty for now. Record your first reel!</p>
        </div>
        <div class="panel" id="tagged-panel">
          <p>No tagged posts yet.</p>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
    <script src="script.js"></script>
  </body>
</html>
